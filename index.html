<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link href='https://fonts.googleapis.com/css?family=Lato:300,400,700' rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body class="page">
    <header class="header">
      <img src="./eisenhower-matrix.jpg" class="header__image" alt="the eisenhower matrix">
      <a class="header__link" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    <main class="main">
      <section class="add-section">
        <h3 class="title add-section__title">Add Item</h3>
        <div class="wrapper">
          <input type="text" class="task-input wrapper__task-input">
          <button class="button">Add</button>
        </div>
      </section>
      <section class="incomplete-section">
        <h3 class="title">Todo</h3>
        <ul class="list incomplete-section__list">
          <li class="list__item">
            <input type="checkbox" class="check-input">
            <label class="task-label">Pay Bills</label>
            <input type="text" class="task-input list-item__task-input">
            <button class="button edit-btn">Edit</button>
            <button class="button delete-btn"><img src="./remove.svg" class="delete-img" alt=""></button>
          </li>
          <li class="list__item list__item_edit-mode">
            <input type="checkbox" class="check-input">
            <label class="task-label">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task-input list-item__task-input">
            <button class="button edit-btn">Save</button>
            <button class="button delete-btn"><img src="./remove.svg" class="delete-img" alt=""></button>
          </li>
        </ul>
      </section>
      <section class="completed-section">
        <h3 class="title">Completed</h3>
        <ul class="list completed-section__list">
          <li class="list__item">
            <input type="checkbox" class="check-input" checked>
            <label class="task-label">See the Doctor</label>
            <input type="text" class="task-input list-item__task-input">
            <button class="button edit-btn">Edit</button>
            <button class="button delete-btn"><img src="./remove.svg" class="delete-img" alt=""></button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
