<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link href='https://fonts.googleapis.com/css?family=Lato:300,400,700' rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body class="page">
    <header class="preview-img">
      <img src="./eisenhower-matrix.jpg" class="todo-image">
      <a class="more-info" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    <main class="main-container">
      <section class="add-item-section">
        <label for="new-task" class="add-label">Add Item</label>
        <div class="task-input-wrap">
          <input id="new-task" class="task-input" type="text">
          <button class="add button">Add</button>
        </div>
      </section>
      <section class="incomplete-tasks-section">
        <h3 class="section-title">Todo</h3>
        <ul class="task-list" id="incomplete-tasks">
          <li class="list-item">
            <input type="checkbox" class="check-input">
            <label class="task-label">Pay Bills</label>
            <input type="text" class="task-input">
            <button class="edit button">Edit</button>
            <button class="delete button"><img src="./remove.svg" class="delete-img"></button>
          </li>
          <li class="edit-mode list-item">
            <input type="checkbox" class="check-input">
            <label class="task-label">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task-input">
            <button class="edit button">Save</button>
            <button class="delete button"><img src="./remove.svg" class="delete-img"></button>
          </li>
        </ul>
      </section>
      <section class="completed-tasks-section">
        <h3 class="section-title">Completed</h3>
        <ul class="task-list" id="completed-tasks">
          <li class="list-item">
            <input type="checkbox" class="check-input" checked>
            <label class="task-label">See the Doctor</label>
            <input type="text" class="task-input">
            <button class="edit button">Edit</button>
            <button class="delete button"><img src="./remove.svg" class="delete-img"></button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
