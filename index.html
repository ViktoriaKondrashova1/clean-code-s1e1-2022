<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link href='https://fonts.googleapis.com/css?family=Lato:300,400,700' rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body class="page">
    <header class="page__header">
      <img src="./eisenhower-matrix.jpg" class="header__image" alt="the eisenhower matrix">
      <a class="header__link" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    <main class="page__main">
      <section class="main__section">
        <h3 class="section__title add-title">Add Item</h3>
        <div class="section__wrap">
          <input class="task-input" type="text">
          <button class="add button">Add</button>
        </div>
      </section>
      <section class="main__section">
        <h3 class="section__title">Todo</h3>
        <ul class="section__list" id="incomplete-tasks">
          <li class="list__item">
            <input type="checkbox" class="item__check-input">
            <label class="item__task-label">Pay Bills</label>
            <input type="text" class="task-input">
            <button class="item__edit-btn button">Edit</button>
            <button class="item__delete-btn button"><img src="./remove.svg" class="delete-img" alt=""></button>
          </li>
          <li class="edit-mode list__item">
            <input type="checkbox" class="item__check-input">
            <label class="item__task-label">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task-input">
            <button class="item__edit-btn button">Save</button>
            <button class="item__delete-btn button"><img src="./remove.svg" class="delete-img" alt=""></button>
          </li>
        </ul>
      </section>
      <section class="main__section">
        <h3 class="section__title">Completed</h3>
        <ul class="section__list" id="completed-tasks">
          <li class="list__item">
            <input type="checkbox" class="item__check-input" checked>
            <label class="item__task-label">See the Doctor</label>
            <input type="text" class="task-input">
            <button class="item__edit-btn button">Edit</button>
            <button class="item__delete-btn button"><img src="./remove.svg" class="delete-img" alt=""></button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
